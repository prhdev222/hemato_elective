name = "hsos-worker"
main = "src/index.js"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]

# ตัวแปรจาก wrangler.toml [vars]: อย่าวาง LIFF_ID ที่นี่ — ใช้ secret แล้ว deploy ถึงจะไม่ทับ Dashboard
#
# Secrets (รันที่เครื่องครั้งหนึ่ง หรือเมื่อเปลี่ยนค่า):
#   npx wrangler secret put LIFF_ID
#   npx wrangler secret put LINE_CHANNEL_TOKEN
#   npx wrangler secret put LINE_CHANNEL_SECRET
#   npx wrangler secret put TURSO_URL
#   npx wrangler secret put TURSO_TOKEN
#   npx wrangler secret put JWT_SECRET
#
# Local dev: เก็บ LIFF_ID ใน .dev.vars (Wrangler โหลดให้อัตโนมัติ)

## หมายเหตุ: ถ้าต้องการผูกโดเมนจริงค่อยเพิ่ม [[routes]] ภายหลัง
